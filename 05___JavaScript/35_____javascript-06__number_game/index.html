  <body>
    <!-- Starting Page -->

    <!-- Screen One Start  -->

    <div id="firstScreen" class="max-w-mContainer m-auto">
      <div class="card bg-base-100 w-[700px] shadow-sm m-auto mt-[150px]">
        <div class="px-10 py-20 pt-10 text-center">
          <h2 class="font-pop text-[40px] font-bold block">Wanna Play game?</h2>
          <input
            id="playerOneInp"
            type="text"
            placeholder="What is your name"
            class="input input-info my-5 rounded-[50px]"
          />
          <button id="startGameBtn" class="btn btn-primary block m-auto">
            Start Game
          </button>

          <div
            id="nameError"
            class="bg-red-500 w-[300px] m-auto rounded-[10px] hidden"
          >
            <h4 class="text-white">Name is missing</h4>
          </div>
        </div>
      </div>
    </div>
    <!-- Screen One End  -->

    <!-- Second One Start  -->
     
    <div id="secondScreen" class="max-w-mContainer m-auto hidden">
      <div class="card bg-base-100 w-[700px] shadow-sm m-auto mt-[150px]">
        <div class="px-10 py-20 pt-10 text-center">
          <h2 id="playerOneName" class="font-pop text-[40px] font-bold block">Player - 1</h2>
          <input
            id="playerOne_numInp"
            type="number"
            placeholder="Give a number"
            class="input input-info my-5 rounded-[50px]"
          />
          <button id="letsPlayBtn" class="btn btn-primary block m-auto">
            Let's Play
          </button>

          <div
            id="numberError"
            class="bg-red-500 w-[300px] m-auto rounded-[10px] hidden"
          >
            <h4 class="text-white">Please give a number</h4>
          </div>
        </div>
      </div>
    </div>

    <!-- Second One End  -->
    <!-- third One Start  -->
     
    <div id="thirdScreen" class="max-w-mContainer m-auto hidden">
      <div class="card bg-base-100 w-[700px] shadow-sm m-auto mt-[150px]">
        <div class="px-10 py-20 pt-10 text-center">
          <h2  class="font-pop text-[40px] font-bold block">Player - 2 Name</h2>
          <input
            id="playerTwo_nameInp"
            type="text"
            placeholder="What is your name"
            class="input input-info my-5 rounded-[50px]"
          />
          <button id="startGameBtnPTwo" class="btn btn-primary block m-auto">
            Start Game
          </button>

          <div
            id="nameErrorPTwo"
            class="bg-red-500 w-[300px] m-auto rounded-[10px] hidden"
          >
            <h4 class="text-white">Name is missing</h4>
          </div>
        </div>
      </div>
    </div>

        <div id="gameOverScreen" class="max-w-mContainer m-auto hidden">
      <div class="card bg-base-100 w-[700px] shadow-sm m-auto mt-[150px]">
        <div class="px-10 py-20 pt-10 text-center">
            <p id="result" class="text-[30px] bg-green-500 text-white mb-6"></p>
