        <!-- fourth One Start  -->
     
    <div id="fourthScreen" class="max-w-mContainer m-auto hidden">
      <div class="card bg-base-100 w-[700px] shadow-sm m-auto mt-[150px]">
        <div class="px-10 py-20 pt-10 text-center">
          <h2 id="playerTwoName" class="font-pop text-[40px] font-bold block">Player - 2</h2>
