<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plugins</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Playwrite+DE+VA:wght@100..400&family=Playwrite+IT+Moderna&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <!-- CSS links Start -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/lightbox.min.css" />
    <link rel="stylesheet" href="css/venobox.min.css" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/media.css" />
    <!-- CSS links End -->
  </head>
  <body>
    <!-- Counter_Part Start -->
    <section id="counterPart">
      <div class="container">
        <div class="row">
          <div class="col-lg-3">
            <div class="card bg-warning">
              <div class="card-body text-center">
                <h5 class="card-title">Total Students</h5>
                <h3 class="counter">500</h3>
              </div>
            </div>
          </div>
          <div class="col-lg-3">
            <div class="card bg-warning">
              <div class="card-body text-center">
                <h5 class="card-title">Total Teacher</h5>
                <h3 class="counter">50</h3>
              </div>
            </div>
          </div>
          <div class="col-lg-3">
            <div class="card bg-warning">
              <div class="card-body text-center">
                <h5 class="card-title">Total Class Room</h5>
                <h3 class="counter">30</h3>
              </div>
            </div>
          </div>

          <div class="col-lg-3">
            <div class="card bg-warning">
              <div class="card-body text-center">
                <h5 class="card-title">Total Coffee</h5>
                <h3 class="counter">600</h3>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Counter_Part End -->

    <!-- CountDown_Part Start -->
    <section id="count_down">
      <div class="container">
        <div class="row">
          <div class="col-lg-3">
            <div class="card bg-warning">
              <div class="card-body text-center">
                <h5 class="card-title">Days</h5>
                <h3 id="days">Days</h3>
              </div>
            </div>
          </div>
          <div class="col-lg-3">
            <div class="card bg-warning">
              <div class="card-body text-center">
                <h5 class="card-title">Hours</h5>
                <h3 id="hours">Hours</h3>
              </div>
            </div>
          </div>
          <div class="col-lg-3">
            <div class="card bg-warning">
              <div class="card-body text-center">
                <h5 class="card-title">Minutes</h5>
                <h3 id="minutes">Minutes</h3>
              </div>
            </div>
          </div>
          <div class="col-lg-3">
            <div class="card bg-warning">
              <div class="card-body text-center">
                <h5 class="card-title">Seconds</h5>
                <h3 id="seconds">Seconds</h3>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- CountDown_Part End -->

    <!-- light_box Start -->
    <section id="light_box">
      <div class="container">
        <div class="row">
          <div class="col-lg-3">
            <div class="card">
              <a href="images/01.jpg" data-lightbox="roadtrip">
                <img src="images/01.jpg" alt="01.jpg" class="w-100 img-fluid" />
              </a>
            </div>
          </div>
          <div class="col-lg-3">
            <div class="card">
              <a href="images/02.jpg" data-lightbox="roadtrip">
                <img src="images/02.jpg" alt="02.jpg" class="w-100 img-fluid" />
              </a>
            </div>
          </div>
          <div class="col-lg-3">
            <div class="card">
              <a href="images/03.jpg" data-lightbox="roadtrip">
                <img src="images/03.jpg" alt="03.jpg" class="w-100 img-fluid" />
              </a>
            </div>
          </div>
          <div class="col-lg-3">
            <div class="card">
              <a href="images/04.jpg" data-lightbox="roadtrip">
                <img src="images/04.jpg" alt="04.jpg" class="w-100 img-fluid" />
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- light_box End -->

    <!-- Venu_box Start -->
    <section id="venu_box">
      <div class="container">
        <div class="row">
          <div class="col-lg-3">
            <div class="card">
              <a
                class="my-image-links"
                data-gall="gallery01"
                data-maxwidth="1000px"
                href="images/01.jpg"
              >
                <img src="images/01.jpg" alt="01.jpg" class="w-100 img-fluid"
              /></a>
            </div>
          </div>
          <div class="col-lg-3">
            <div class="card">
              <a
                class="my-image-links"
                data-gall="gallery01"
                data-maxwidth="1000px"
                href="images/02.jpg"
              >
                <img src="images/02.jpg" alt="02.jpg" class="w-100 img-fluid"
              /></a>
            </div>
          </div>
          <div class="col-lg-3">
            <div class="card">
              <a
                class="my-image-links"
                data-gall="gallery01"
                data-maxwidth="1000px"
                href="images/03.jpg"
              >
                <img src="images/03.jpg" alt="03.jpg" class="w-100 img-fluid"
              /></a>
            </div>
          </div>
          <div class="col-lg-3">
            <div class="card">
              <a
                class="my-image-links"
                data-gall="gallery01"
                data-maxwidth="1000px"
                href="images/04.jpg"
              >
                <img src="images/04.jpg" alt="04.jpg" class="w-100 img-fluid"
              /></a>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- light_box End -->

    <!-- Video_Part Start -->
    <section id="vedio_part">
      <div class="container">
        <div class="row">
          <div class="col-lg-6">
            <div class="card">
              <a class="my-video-links" data-autoplay="true" data-vbtype="video" href="https://www.youtube.com/watch?v=q4toZ-XY7_w">
                <button class="w-100">
                <span class="text">Play</span>
              </button>
              </a>
                
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card">
              <a class="my-video-links" data-autoplay="true" data-vbtype="video" href="https://www.youtube.com/watch?v=0It_1T0j0_U">
                <button class="w-100">
                <span class="text">Play</span>
              </button>
              </a>
                
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- Video_Part End -->

    <!-- Typed_Part Start -->
         <section id="typed_part">
      <div class="container">
        <div class="row">
          <div class="col-lg-6 ">
            <div class="card bg-info">
              <h1>Hello we are <span class="typed"></span></h1>

                
            </div>
          </div>
        
        </div>
      </div>
    </section>
    <!-- Typed_Part End -->

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/waypoints.min.js"></script>
    <script src="js/counterup.min.js"></script>
    <script src="js/lightbox.min.js"></script>
    <script src="js/venobox.min.js"></script>
    <script src="js/typed.min.js"></script>
    <script src="js/script.js"></script>

  </body>
</html>
