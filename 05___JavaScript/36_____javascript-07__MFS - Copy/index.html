<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="src/output.css" />
  </head>
  <body>
    <div class="max-w-[1320px] m-auto flex justify-center">
      <div class="mockup-phone border-primary" id="loginScrn">
        <div class="mockup-phone-camera"></div>
        <div class="mockup-phone-display">
          <div class="flex justify-center m-auto h-[200px] w-[200px] mb-10">
            <img src="images/01.webp" alt="01.webp" class="rounded-4xl" />
          </div>

          <!-- From Uiverse.io by themrsami -->
          <div
            class="h-[500px] flex items-center justify-center bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 rounded-4xl"
          >
            <div class="relative">
              <div
                class="absolute -top-2 -left-2 -right-2 -bottom-2 rounded-lg bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 shadow-lg animate-pulse"
              ></div>
              <div
                id="form-container"
                class="bg-white p-16 rounded-lg shadow-2xl w-80 relative z-10 transform transition duration-500 ease-in-out"
              >
                <h2
                  id="form-title"
                  class="text-center text-3xl font-bold mb-10 text-gray-800"
                >
                  Login
                </h2>
                <form class="space-y-5">
                  <input
                    class="w-full h-12 border border-gray-800 px-3 rounded-lg"
                    placeholder="Enter Your Number"
                    name=""
                    type="number"
                    id="loginNumber"
                  />
                  <input
                    class="w-full h-12 border border-gray-800 px-3 rounded-lg"
                    placeholder="Enter Four Digit Pin"
                    name=""
                    type="password"
                    id="loginPass"
                  />
                  <button
                    class="w-full h-12 bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                    id="loginBtn"
                  >
                    Sign in
                  </button>
                  <!-- <a class="text-blue-500 hover:text-blue-800 text-sm" href="#">Forgot Password?</a> -->
                </form>
                <div class="">
                  <p class="text-red-500 text-right hidden" id="errorMsg">
                    Incorrect
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>



    <script src="js/script.js"></script>
  </body>
</html>
